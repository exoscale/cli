name: "Build"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - run: make go.mk
      shell: bash

    - uses: ./go.mk/.github/actions/setup

    - uses: ./go.mk/.github/actions/pre-check

    - run: make build
      shell: bash

    - run: make test-verbose
      shell: bash
